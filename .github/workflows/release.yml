name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release when running manually
        required: true
        default: main
      create_tag:
        description: Create and push the resolved release tag before publishing
        required: true
        type: boolean
        default: false
      publish_github_release:
        description: Publish or update the GitHub Release
        required: true
        type: boolean
        default: false
      publish_to_crates:
        description: Publish crates to crates.io
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  native-artifacts:
    name: Native artifact (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-x86
            runner: ubuntu-latest
            target: i686-unknown-linux-gnu
            apt: gcc-multilib
            rustflags: -C link-arg=-m32
          - name: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            apt: gcc-aarch64-linux-gnu
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
            linker: aarch64-linux-gnu-gcc
          - name: linux-armv7
            runner: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            apt: gcc-arm-linux-gnueabihf
            linker_env: CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER
            linker: arm-linux-gnueabihf-gcc
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - name: windows-x86
            runner: windows-latest
            target: i686-pc-windows-msvc
          - name: windows-aarch64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
          - name: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
          - name: ios-aarch64
            runner: macos-latest
            target: aarch64-apple-ios
          - name: ios-aarch64-sim
            runner: macos-latest
            target: aarch64-apple-ios-sim
          - name: ios-x86_64-sim
            runner: macos-latest
            target: x86_64-apple-ios
          - name: android-aarch64
            runner: ubuntu-latest
            target: aarch64-linux-android
            android: true
          - name: android-armv7
            runner: ubuntu-latest
            target: armv7-linux-androideabi
            android: true
          - name: android-x86
            runner: ubuntu-latest
            target: i686-linux-android
            android: true
          - name: android-x86_64
            runner: ubuntu-latest
            target: x86_64-linux-android
            android: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross linker
        if: runner.os == 'Linux' && matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Setup Android NDK
        if: matrix.android
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Configure cross linker
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ matrix.linker_env }}" ]; then
            echo "${{ matrix.linker_env }}=${{ matrix.linker }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ matrix.rustflags }}" ]; then
            echo "RUSTFLAGS=${{ matrix.rustflags }}" >> "$GITHUB_ENV"
          fi

          if [ "${{ matrix.android }}" = "true" ]; then
            toolchain="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
            case "${{ matrix.target }}" in
              aarch64-linux-android)
                echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$toolchain/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
                ;;
              armv7-linux-androideabi)
                echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$toolchain/armv7a-linux-androideabi21-clang" >> "$GITHUB_ENV"
                ;;
              i686-linux-android)
                echo "CARGO_TARGET_I686_LINUX_ANDROID_LINKER=$toolchain/i686-linux-android21-clang" >> "$GITHUB_ENV"
                ;;
              x86_64-linux-android)
                echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$toolchain/x86_64-linux-android21-clang" >> "$GITHUB_ENV"
                ;;
            esac
          fi

      - name: Package native link library
        run: >
          python scripts/package_native_artifacts.py
          --target ${{ matrix.target }}
          --package-name ${{ matrix.name }}
          --out artifacts/native
          --skip-symbol-check
          --transport-scope tcp
          --transport-scope quic
          --transport-scope ipc
          --transport-scope websocket

      - name: Inspect native artifact boundaries
        run: python scripts/inspect_release_artifacts.py --native-dir artifacts/native

      - name: Upload native artifact
        uses: actions/upload-artifact@v6
        with:
          name: nnrp-ffi-native-${{ matrix.name }}
          path: artifacts/native/*
          if-no-files-found: error

  package:
    needs: native-artifacts
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Checkout nnrp-conformance action
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/nnrp-conformance
          path: nnrp-conformance-action
          fetch-depth: 1

      - name: Resolve version
        id: version
        run: |
          python scripts/resolve_version.py show --github-output --run-number ""

      - name: Validate pushed tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          expected_tag="${{ steps.version.outputs.tag_name }}"
          actual_tag="${{ github.ref_name }}"

          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Release tag mismatch: expected $expected_tag but workflow was triggered by $actual_tag."
            exit 1
          fi

      - name: Validate manual release options
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ inputs.publish_github_release }}" = "true" ] && [ "${{ inputs.create_tag }}" != "true" ]; then
            echo "Manual GitHub Release publishing requires create_tag=true so the release is anchored to an explicit tag."
            exit 1
          fi

          if [ "${{ inputs.publish_to_crates }}" = "true" ] && [ "${{ inputs.create_tag }}" != "true" ]; then
            echo "Manual crates.io publishing requires create_tag=true so crate publication cannot start from an untagged ref."
            exit 1
          fi

      - name: Create git tag
        if: github.event_name == 'workflow_dispatch' && inputs.create_tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags
          tag="${{ steps.version.outputs.tag_name }}"
          if [ -z "$(git tag --list "$tag")" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Apply build version
        run: |
          python scripts/resolve_version.py apply --package-version "${{ steps.version.outputs.package_version }}"

      - name: Format check
        run: cargo fmt --all --check

      - name: Test
        env:
          NNRP_CONFORMANCE_SUITE_REPO: ${{ github.workspace }}/nnrp-conformance-action
        run: cargo test --workspace

      - name: Run preview2 suite-owned conformance action
        uses: ./nnrp-conformance-action/.github/actions/run-conformance
        with:
          protocol-version: nnrp-1-preview2
          capabilities-path: conformance/nnrp-1-preview2.capabilities.json
          working-directory: .
          artifact-name: nnrp-rs-preview2-conformance
          adapter-command: >-
            cargo run -p nnrp-conformance --bin nnrp-conformance-adapter --
            --plan $env:NNRP_CONFORMANCE_ADAPTER_PLAN
            --output $env:NNRP_CONFORMANCE_ADAPTER_RESULTS

      - name: Run preview3 suite-owned conformance action
        uses: ./nnrp-conformance-action/.github/actions/run-conformance
        with:
          protocol-version: nnrp-1-preview3
          capabilities-path: conformance/nnrp-1-preview3.capabilities.json
          working-directory: .
          artifact-name: nnrp-rs-preview3-conformance
          adapter-command: >-
            cargo run -p nnrp-conformance --bin nnrp-conformance-adapter --
            --plan $env:NNRP_CONFORMANCE_ADAPTER_PLAN
            --output $env:NNRP_CONFORMANCE_ADAPTER_RESULTS

      - name: Run preview4 suite-owned conformance action
        uses: ./nnrp-conformance-action/.github/actions/run-conformance
        with:
          protocol-version: nnrp-1-preview4
          working-directory: .
          artifact-name: nnrp-rs-preview4-conformance

      - name: Run preview4 wire conformance dry-run
        shell: bash
        run: |
          cargo run -p nnrp-conformance --bin nnrp-conformance-wire -- \
            --suite nnrp-conformance-action/wire-conformance/nnrp-1-preview4/manifest.json \
            --target nnrp-conformance-action/docs/examples/wire-conformance-target.sample.json \
            --output target/wire-conformance/preview4-dry-run.json

      - name: Download native link libraries
        uses: actions/download-artifact@v7
        with:
          pattern: nnrp-ffi-native-*
          path: artifacts/native
          merge-multiple: true

      - name: Package WASM primitives
        run: |
          rustup target add wasm32-unknown-unknown
          python scripts/package_wasm_primitives.py --out artifacts/wasm --transport-scope browser

      - name: Inspect release artifact boundaries
        run: |
          python scripts/inspect_release_artifacts.py --native-dir artifacts/native --wasm-dir artifacts/wasm

      - name: Bundle release artifacts
        run: |
          python - <<'PY'
          import hashlib
          import json
          import pathlib
          import shutil
          import zipfile

          version = '${{ steps.version.outputs.package_version }}'
          dist_dir = pathlib.Path('artifacts')
          dist_dir.mkdir(exist_ok=True)
          release_dir = dist_dir / 'release-assets'
          if release_dir.exists():
            shutil.rmtree(release_dir)
          release_dir.mkdir(exist_ok=True)

          source_artifact = dist_dir / f'nnrp-rs-source-{version}.zip'
          with zipfile.ZipFile(source_artifact, 'w', compression=zipfile.ZIP_DEFLATED) as archive:
            include_paths = [
              pathlib.Path('Cargo.toml'),
              pathlib.Path('Cargo.lock'),
              pathlib.Path('README.md'),
              pathlib.Path('LICENSE'),
            ]
            for path in include_paths:
              if path.exists():
                archive.write(path, path.as_posix())

            for root in ('crates', 'doc'):
              base = pathlib.Path(root)
              if not base.exists():
                continue
              for item in sorted(base.rglob('*')):
                if item.is_file():
                  archive.write(item, item.as_posix())

            for root in ('include', 'artifacts/native', 'artifacts/wasm'):
              base = pathlib.Path(root)
              if not base.exists():
                continue
              for item in sorted(base.rglob('*')):
                if item.is_file():
                  archive.write(item, item.as_posix())

          def zip_dir(source: pathlib.Path, artifact: pathlib.Path) -> None:
            with zipfile.ZipFile(artifact, 'w', compression=zipfile.ZIP_DEFLATED) as archive:
              for item in sorted(source.rglob('*')):
                if item.is_file():
                  archive.write(item, item.relative_to(source).as_posix())

          for package_dir in sorted((dist_dir / 'native').glob('*')):
            if package_dir.is_dir():
              manifest_path = package_dir / 'manifest.json'
              manifest = json.loads(manifest_path.read_text()) if manifest_path.is_file() else {}
              package = manifest.get('package', 'nnrp-ffi')
              platform_name = package_dir.name
              scope = manifest.get('transport_scope', 'all')
              if scope != 'all' and platform_name.startswith(f'{scope}-'):
                platform_name = platform_name[len(scope) + 1:]
              zip_dir(package_dir, release_dir / f'{package}-native-{platform_name}-{version}.zip')

          for wasm_dir in sorted((dist_dir / 'wasm').glob('*')):
            if wasm_dir.is_dir():
              manifest_path = wasm_dir / 'manifest.json'
              manifest = json.loads(manifest_path.read_text()) if manifest_path.is_file() else {}
              artifact = manifest.get('artifact', manifest.get('package', wasm_dir.name))
              zip_dir(wasm_dir, release_dir / f'{artifact}-{version}.zip')

          checksums = []
          for artifact in sorted(release_dir.glob('*')):
            if artifact.is_file():
              digest = hashlib.sha256(artifact.read_bytes()).hexdigest()
              checksums.append(f'{digest}  {artifact.name}')
          (release_dir / 'SHA256SUMS').write_text('\n'.join(checksums) + '\n')
          PY

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nnrp-rs-release-${{ steps.version.outputs.package_version }}
          path: |
            artifacts/nnrp-rs-source-${{ steps.version.outputs.package_version }}.zip
            artifacts/release-assets/**
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_tag && inputs.publish_github_release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: nnrp-rs v${{ steps.version.outputs.package_version }}
          files: artifacts/release-assets/*

      - name: Publish crates to crates.io
        if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_tag && inputs.publish_to_crates)) && env.CARGO_REGISTRY_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.package_version }}"

          crate_version_exists() {
            local crate="$1"
            python - "$crate" "$version" <<'PY'
          import sys
          import urllib.error
          import urllib.request

          crate = sys.argv[1]
          version = sys.argv[2]
          url = f"https://crates.io/api/v1/crates/{crate}/{version}"

          try:
            with urllib.request.urlopen(url, timeout=30) as response:
              sys.exit(0 if response.status == 200 else 1)
          except urllib.error.HTTPError as error:
            if error.code == 404:
              sys.exit(1)
            raise
          PY
          }

          sleep_until_retry_after() {
            local output="$1"
            local retry_after
            retry_after="$(python - "$output" <<'PY'
          import email.utils
          import re
          import sys
          import time

          output = sys.argv[1]
          match = re.search(r"try again after (.+? GMT)", output)
          if not match:
            print("")
            sys.exit(0)

          target = email.utils.parsedate_to_datetime(match.group(1)).timestamp()
          wait = max(15, int(target - time.time()) + 10)
          print(wait)
          PY
          )"

            if [ -n "$retry_after" ]; then
              echo "crates.io rate limit requested waiting ${retry_after}s before retrying."
              sleep "$retry_after"
              return 0
            fi

            return 1
          }

          for crate in nnrp-core nnrp-runtime nnrp-transport-provider nnrp-ffi nnrp-transport-tcp nnrp-transport-quic nnrp-transport-ipc nnrp-transport-websocket nnrp-wasm nnrp-conformance; do
            published=0
            if crate_version_exists "$crate"; then
              echo "$crate $version is already published; skipping."
              continue
            fi

            for attempt in 1 2 3 4 5; do
              echo "Publishing $crate $version (attempt $attempt)."
              output_file="$(mktemp)"
              if cargo publish -p "$crate" 2>&1 | tee "$output_file"; then
                published=1
                break
              fi

              output="$(cat "$output_file")"
              rm -f "$output_file"

              if crate_version_exists "$crate"; then
                echo "$crate $version is visible on crates.io after publish retry; continuing."
                published=1
                break
              fi

              if echo "$output" | grep -q "429 Too Many Requests"; then
                sleep_until_retry_after "$output" || sleep 60
              elif [ "$attempt" -lt 5 ]; then
                sleep $((attempt * 20))
              fi
            done

            if [ "$published" -ne 1 ]; then
              exit 1
            fi
          done
