name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import tomllib
          data = tomllib.loads(pathlib.Path('Cargo.toml').read_text(encoding='utf-8'))
          print(f"value={data['workspace']['package']['version']}")
          PY

      - name: Format check
        run: cargo fmt --all --check

      - name: Test
        run: cargo test --workspace

      - name: Bundle release artifacts
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          version = '${{ steps.version.outputs.value }}'
          dist_dir = pathlib.Path('artifacts')
          dist_dir.mkdir(exist_ok=True)
          artifact = dist_dir / f'nnrp-rs-source-{version}.zip'
          with zipfile.ZipFile(artifact, 'w', compression=zipfile.ZIP_DEFLATED) as archive:
            include_paths = [
              pathlib.Path('Cargo.toml'),
              pathlib.Path('Cargo.lock'),
              pathlib.Path('README.md'),
              pathlib.Path('LICENSE'),
            ]
            for path in include_paths:
              if path.exists():
                archive.write(path, path.as_posix())

            for root in ('crates', 'doc'):
              base = pathlib.Path(root)
              if not base.exists():
                continue
              for item in sorted(base.rglob('*')):
                if item.is_file():
                  archive.write(item, item.as_posix())
          PY

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nnrp-rs-release-${{ steps.version.outputs.value }}
          path: artifacts/nnrp-rs-source-${{ steps.version.outputs.value }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Create git tag
        if: github.ref == 'refs/heads/master'
        id: tag
        run: |
          git fetch --tags
          tag="v${{ steps.version.outputs.value }}"
          if [ -z "$(git tag --list "$tag")" ]; then
            git tag "$tag"
            git push origin "$tag"
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: nnrp-rs v${{ steps.version.outputs.value }}
          files: artifacts/nnrp-rs-source-${{ steps.version.outputs.value }}.zip

      - name: Publish crates to crates.io
        if: github.ref == 'refs/heads/master' && env.CARGO_REGISTRY_TOKEN != '' && steps.tag.outputs.created == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in nnrp-core nnrp-ffi nnrp-conformance; do
            published=0
            for attempt in 1 2 3; do
              if cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN"; then
                published=1
                break
              fi

              if [ "$attempt" -lt 3 ]; then
                sleep 15
              fi
            done

            if [ "$published" -ne 1 ]; then
              exit 1
            fi
          done