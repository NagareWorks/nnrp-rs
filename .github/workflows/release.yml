name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify change set
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only "$base" "$head")

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true
          for path in "${changed_files[@]}"; do
            if [[ "$path" == *.md ]] || [[ "$path" =~ ^(doc/|docs/|\.github/PULL_REQUEST_TEMPLATE/) ]] || [[ "$path" =~ ^\.github/[^/]+\.md$ ]]; then
              continue
            fi

            docs_only=false
            break
          done

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  package:
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve version
        id: version
        run: |
          python scripts/resolve_version.py show --github-output

      - name: Apply build version
        run: |
          python scripts/resolve_version.py apply --package-version "${{ steps.version.outputs.package_version }}"

      - name: Format check
        run: cargo fmt --all --check

      - name: Test
        run: cargo test --workspace

      - name: Bundle release artifacts
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          version = '${{ steps.version.outputs.package_version }}'
          dist_dir = pathlib.Path('artifacts')
          dist_dir.mkdir(exist_ok=True)
          artifact = dist_dir / f'nnrp-rs-source-{version}.zip'
          with zipfile.ZipFile(artifact, 'w', compression=zipfile.ZIP_DEFLATED) as archive:
            include_paths = [
              pathlib.Path('Cargo.toml'),
              pathlib.Path('Cargo.lock'),
              pathlib.Path('README.md'),
              pathlib.Path('LICENSE'),
            ]
            for path in include_paths:
              if path.exists():
                archive.write(path, path.as_posix())

            for root in ('crates', 'doc'):
              base = pathlib.Path(root)
              if not base.exists():
                continue
              for item in sorted(base.rglob('*')):
                if item.is_file():
                  archive.write(item, item.as_posix())
          PY

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nnrp-rs-release-${{ steps.version.outputs.package_version }}
          path: artifacts/nnrp-rs-source-${{ steps.version.outputs.package_version }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Create git tag
        if: github.ref == 'refs/heads/master'
        run: |
          git fetch --tags
          tag="${{ steps.version.outputs.tag_name }}"
          if [ -z "$(git tag --list "$tag")" ]; then
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Publish GitHub release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: nnrp-rs v${{ steps.version.outputs.release_version }}
          files: artifacts/nnrp-rs-source-${{ steps.version.outputs.package_version }}.zip

      - name: Publish crates to crates.io
        if: github.ref == 'refs/heads/master' && env.CARGO_REGISTRY_TOKEN != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in nnrp-core nnrp-ffi nnrp-conformance; do
            published=0
            for attempt in 1 2 3; do
              if cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN"; then
                published=1
                break
              fi

              if [ "$attempt" -lt 3 ]; then
                sleep 15
              fi
            done

            if [ "$published" -ne 1 ]; then
              exit 1
            fi
          done