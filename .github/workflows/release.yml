name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release when running manually
        required: true
        default: main
      create_tag:
        description: Create and push the resolved release tag before publishing
        required: true
        type: boolean
        default: false
      publish_github_release:
        description: Publish or update the GitHub Release
        required: true
        type: boolean
        default: false
      publish_to_crates:
        description: Publish crates to crates.io
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:

  package:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout nnrp-conformance action
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/nnrp-conformance
          path: nnrp-conformance-action
          fetch-depth: 1

      - name: Resolve version
        id: version
        run: |
          python scripts/resolve_version.py show --github-output --run-number ""

      - name: Validate pushed tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          expected_tag="${{ steps.version.outputs.tag_name }}"
          actual_tag="${{ github.ref_name }}"

          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Release tag mismatch: expected $expected_tag but workflow was triggered by $actual_tag."
            exit 1
          fi

      - name: Validate manual release options
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ inputs.publish_github_release }}" = "true" ] && [ "${{ inputs.create_tag }}" != "true" ]; then
            echo "Manual GitHub Release publishing requires create_tag=true so the release is anchored to an explicit tag."
            exit 1
          fi

          if [ "${{ inputs.publish_to_crates }}" = "true" ] && [ "${{ inputs.create_tag }}" != "true" ]; then
            echo "Manual crates.io publishing requires create_tag=true so crate publication cannot start from an untagged ref."
            exit 1
          fi

      - name: Create git tag
        if: github.event_name == 'workflow_dispatch' && inputs.create_tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags
          tag="${{ steps.version.outputs.tag_name }}"
          if [ -z "$(git tag --list "$tag")" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Apply build version
        run: |
          python scripts/resolve_version.py apply --package-version "${{ steps.version.outputs.package_version }}"

      - name: Format check
        run: cargo fmt --all --check

      - name: Test
        env:
          NNRP_CONFORMANCE_SUITE_REPO: ${{ github.workspace }}/nnrp-conformance-action
        run: cargo test --workspace

      - name: Package native link library
        run: |
          python scripts/package_native_artifacts.py --out artifacts/native

      - name: Package WASM primitives
        run: |
          rustup target add wasm32-unknown-unknown
          python scripts/package_wasm_primitives.py --out artifacts/wasm

      - name: Bundle release artifacts
        run: |
          python - <<'PY'
          import hashlib
          import pathlib
          import shutil
          import zipfile

          version = '${{ steps.version.outputs.package_version }}'
          dist_dir = pathlib.Path('artifacts')
          dist_dir.mkdir(exist_ok=True)
          release_dir = dist_dir / 'release-assets'
          if release_dir.exists():
            shutil.rmtree(release_dir)
          release_dir.mkdir(exist_ok=True)

          source_artifact = dist_dir / f'nnrp-rs-source-{version}.zip'
          with zipfile.ZipFile(source_artifact, 'w', compression=zipfile.ZIP_DEFLATED) as archive:
            include_paths = [
              pathlib.Path('Cargo.toml'),
              pathlib.Path('Cargo.lock'),
              pathlib.Path('README.md'),
              pathlib.Path('LICENSE'),
            ]
            for path in include_paths:
              if path.exists():
                archive.write(path, path.as_posix())

            for root in ('crates', 'doc'):
              base = pathlib.Path(root)
              if not base.exists():
                continue
              for item in sorted(base.rglob('*')):
                if item.is_file():
                  archive.write(item, item.as_posix())

            for root in ('include', 'artifacts/native', 'artifacts/wasm'):
              base = pathlib.Path(root)
              if not base.exists():
                continue
              for item in sorted(base.rglob('*')):
                if item.is_file():
                  archive.write(item, item.as_posix())

          def zip_dir(source: pathlib.Path, artifact: pathlib.Path) -> None:
            with zipfile.ZipFile(artifact, 'w', compression=zipfile.ZIP_DEFLATED) as archive:
              for item in sorted(source.rglob('*')):
                if item.is_file():
                  archive.write(item, item.relative_to(source).as_posix())

          for package_dir in sorted((dist_dir / 'native').glob('*')):
            if package_dir.is_dir():
              zip_dir(package_dir, release_dir / f'nnrp-ffi-native-{package_dir.name}-{version}.zip')

          wasm_dir = dist_dir / 'wasm' / 'nnrp-wasm-primitives'
          if wasm_dir.is_dir():
            zip_dir(wasm_dir, release_dir / f'nnrp-wasm-primitives-{version}.zip')

          checksums = []
          for artifact in sorted(release_dir.glob('*')):
            if artifact.is_file():
              digest = hashlib.sha256(artifact.read_bytes()).hexdigest()
              checksums.append(f'{digest}  {artifact.name}')
          (release_dir / 'SHA256SUMS').write_text('\n'.join(checksums) + '\n')
          PY

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nnrp-rs-release-${{ steps.version.outputs.package_version }}
          path: |
            artifacts/nnrp-rs-source-${{ steps.version.outputs.package_version }}.zip
            artifacts/release-assets/**
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_tag && inputs.publish_github_release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: nnrp-rs v${{ steps.version.outputs.package_version }}
          files: artifacts/release-assets/*

      - name: Publish crates to crates.io
        if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_tag && inputs.publish_to_crates)) && env.CARGO_REGISTRY_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.package_version }}"

          crate_version_exists() {
            local crate="$1"
            python - "$crate" "$version" <<'PY'
          import sys
          import urllib.error
          import urllib.request

          crate = sys.argv[1]
          version = sys.argv[2]
          url = f"https://crates.io/api/v1/crates/{crate}/{version}"

          try:
            with urllib.request.urlopen(url, timeout=30) as response:
              sys.exit(0 if response.status == 200 else 1)
          except urllib.error.HTTPError as error:
            if error.code == 404:
              sys.exit(1)
            raise
          PY
          }

          sleep_until_retry_after() {
            local output="$1"
            local retry_after
            retry_after="$(python - "$output" <<'PY'
          import email.utils
          import re
          import sys
          import time

          output = sys.argv[1]
          match = re.search(r"try again after (.+? GMT)", output)
          if not match:
            print("")
            sys.exit(0)

          target = email.utils.parsedate_to_datetime(match.group(1)).timestamp()
          wait = max(15, int(target - time.time()) + 10)
          print(wait)
          PY
          )"

            if [ -n "$retry_after" ]; then
              echo "crates.io rate limit requested waiting ${retry_after}s before retrying."
              sleep "$retry_after"
              return 0
            fi

            return 1
          }

          for crate in nnrp-core nnrp-runtime nnrp-transport-provider nnrp-ffi nnrp-transport-tcp nnrp-transport-quic nnrp-wasm nnrp-conformance; do
            published=0
            if crate_version_exists "$crate"; then
              echo "$crate $version is already published; skipping."
              continue
            fi

            for attempt in 1 2 3 4 5; do
              echo "Publishing $crate $version (attempt $attempt)."
              output_file="$(mktemp)"
              if cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN" 2>&1 | tee "$output_file"; then
                published=1
                break
              fi

              output="$(cat "$output_file")"
              rm -f "$output_file"

              if crate_version_exists "$crate"; then
                echo "$crate $version is visible on crates.io after publish retry; continuing."
                published=1
                break
              fi

              if echo "$output" | grep -q "429 Too Many Requests"; then
                sleep_until_retry_after "$output" || sleep 60
              elif [ "$attempt" -lt 5 ]; then
                sleep $((attempt * 20))
              fi
            done

            if [ "$published" -ne 1 ]; then
              exit 1
            fi
          done
