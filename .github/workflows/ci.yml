name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  commit-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Enforce single-commit PR policy
        shell: bash
        run: |
          set -euo pipefail

          head_ref="${{ github.head_ref }}"
          base_ref="${{ github.base_ref }}"

          if [[ "$head_ref" =~ ^release/ ]] || [[ "$base_ref" =~ ^release/ ]]; then
            echo "Release/version branch PR detected; multi-commit history is allowed when needed."
            exit 0
          fi

          commit_count='${{ github.event.pull_request.commits }}'
          if [ "$commit_count" -ne 1 ]; then
            echo "Normal PRs from feature/fix/docs/chore branches must contain exactly one commit before review. Current PR has $commit_count commits. Squash the history before requesting review."
            exit 1
          fi

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Checkout nnrp-conformance action
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/nnrp-conformance
          path: nnrp-conformance-action
          fetch-depth: 1

      - name: Format check
        run: cargo fmt --all --check

      - name: Test
        env:
          NNRP_CONFORMANCE_SUITE_REPO: ${{ github.workspace }}/nnrp-conformance-action
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Coverage
        env:
          NNRP_CONFORMANCE_SUITE_REPO: ${{ github.workspace }}/nnrp-conformance-action
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --lcov --output-path target/llvm-cov/lcov.info

      - name: Coverage gates
        shell: bash
        run: |
          base_sha=""
          head_sha=""

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          python scripts/check_lcov_coverage.py \
            --lcov target/llvm-cov/lcov.info \
            --threshold 90 \
            --base-sha "$base_sha" \
            --head-sha "$head_sha"

  native-artifact:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and verify native artifact
        run: python scripts/package_native_artifacts.py --out artifacts/native

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: nnrp-ffi-native-${{ runner.os }}-${{ runner.arch }}
          path: artifacts/native
          if-no-files-found: error

  wasm-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build and package WASM primitives
        run: python scripts/package_wasm_primitives.py --out artifacts/wasm

      - name: Upload WASM primitives
        uses: actions/upload-artifact@v4
        with:
          name: nnrp-wasm-primitives
          path: artifacts/wasm
          if-no-files-found: error

  conformance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout nnrp-conformance action
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/nnrp-conformance
          path: nnrp-conformance-action
          fetch-depth: 1

      - name: Run suite-owned conformance action
        uses: ./nnrp-conformance-action/.github/actions/run-conformance
        with:
          protocol-version: nnrp-1-preview3
          capabilities-path: conformance/nnrp-1-preview3.capabilities.json
          working-directory: .
          artifact-name: nnrp-rs-conformance
          adapter-command: >-
            cargo run -p nnrp-conformance --bin nnrp-conformance-adapter --
            --plan $env:NNRP_CONFORMANCE_ADAPTER_PLAN
            --output $env:NNRP_CONFORMANCE_ADAPTER_RESULTS

  required-checks:
    needs:
      - commit-policy
      - test
      - native-artifact
      - wasm-artifact
      - conformance
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Enforce required CI path
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ needs.commit-policy.result }}" != "success" ]; then
            echo "PR commit policy validation failed."
            exit 1
          fi

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Format or test validation failed."
            exit 1
          fi

          if [ "${{ needs.native-artifact.result }}" != "success" ]; then
            echo "Native artifact validation failed."
            exit 1
          fi

          if [ "${{ needs.wasm-artifact.result }}" != "success" ]; then
            echo "WASM artifact validation failed."
            exit 1
          fi

          if [ "${{ needs.conformance.result }}" != "success" ]; then
            echo "Conformance validation failed."
            exit 1
          fi
