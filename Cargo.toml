[workspace]
members = [
    "crates/nnrp-core",
    "crates/nnrp-runtime",
    "crates/nnrp-transport-provider",
    "crates/nnrp-transport-tcp",
    "crates/nnrp-ffi",
    "crates/nnrp-conformance",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "Apache-2.0"
version = "1.0.0-preview.2"
rust-version = "1.82"
authors = ["NagareWorks"]

[workspace.dependencies]
async-trait = "0.1"
thiserror = "2.0"
tokio = { version = "1", features = ["io-util", "macros", "net", "rt-multi-thread", "sync", "time"] }
